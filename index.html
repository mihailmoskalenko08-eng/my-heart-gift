<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сюрприз</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #000;
            color: #ff0000; /* Красный цвет сердца */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: monospace; /* Шрифт для символов */
        }

        /* Контейнер для сердца из символов */
        pre {
            font-size: 12px; 
            line-height: 12px;
            font-weight: bold;
            white-space: pre; /* Чтобы пробелы не схлопывались */
        }

        /* Текст поздравления */
        .message {
            margin-top: 20px;
            color: white;
            font-family: sans-serif;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            opacity: 0;
            animation: fadeIn 3s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Сюда скрипт будет рисовать сердце -->
    <pre id="heart"></pre>
    
    <div class="message">С Днем Рождения!</div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        // Математика для 3D сердца
        const pre = document.getElementById("heart");
        
        let interval = setInterval(() => {
            let result = [];
            
            // Настройки размера и вращения
            // t - время (угол вращения)
            let t = Date.now() / 1000; 
            
            // Проходим по сетке координат (y от 1.3 до -1.1, x от -1.2 до 1.2)
            for (let y = 1.3; y > -1.1; y -= 0.06) {
                let row = "";
                for (let x = -1.2; x < 1.2; x += 0.025) {
                    
                    // Формула сердца и вращения
                    let z = x * x + y * y - 1;
                    let f = z * z * z - x * x * y * y * y;
                    
                    // Добавляем эффект вращения (синус/косинус от времени t)
                    let rotateX = x * Math.cos(t) - y * Math.sin(t);
                    let rotateY = x * Math.sin(t) + y * Math.cos(t);
                    
                    // Еще раз проверяем форму с учетом вращения для 3D эффекта
                    let zR = rotateX * rotateX + Math.pow(rotateY * 1.5 - 0.5, 2) - 1;
                    let fR = zR * zR * zR - rotateX * rotateX * Math.pow(rotateY * 1.5 - 0.5, 3);

                    // Если точка попадает в форму сердца
                    if (fR < 0) {
                        // Выбираем символ в зависимости от глубины (чтобы было объемно)
                        // Менять символы можно здесь: ".:-=+*#%@"
                        let charIndex = Math.floor(Math.abs(rotateX - rotateY) * 5) % 5;
                        row += ".:-=+*#%@"[charIndex] || "*";
                    } else {
                        row += " "; // Пустота
                    }
                }
                result.push(row);
            }
            pre.innerText = result.join("\n");
        }, 50); // Скорость обновления (50мс)
    </script>
</body>
</html>
