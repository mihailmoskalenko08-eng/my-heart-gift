<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сюрприз</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #000;
            color: #ff0000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: monospace;
        }

        pre {
            /* Размер шрифта (чем меньше, тем меньше сердце) */
            font-size: 8px; 
            line-height: 8px;
            font-weight: bold;
            white-space: pre;
        }

        .message {
            margin-top: 20px;
            color: white;
            font-family: sans-serif;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            opacity: 0;
            animation: fadeIn 3s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <pre id="heart"></pre>
    
    <div class="message">С Днем Рождения!</div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        const pre = document.getElementById("heart");

        let interval = setInterval(() => {
            let result = [];
            
            // Время для анимации
            let t = Date.now() / 1000;
            
            // Формула биения сердца:
            // scale меняется от 1.0 до 1.15 ритмично
            // Цифра 4 отвечает за скорость биения (больше = быстрее)
            let scale = 1 + 0.15 * Math.pow(Math.sin(t * 4), 2);

            // Проходим по координатам
            // y от 1.3 до -1.3 (высота)
            for (let y = 1.3; y > -1.3; y -= 0.06) {
                let row = "";
                
                // x от -1.2 до 1.2
                // Шаг 0.05 делает сердце узким (как ты просил)
                for (let x = -1.2; x < 1.2; x += 0.05) {
                    
                    // Корректируем координаты с учетом пульсации (scale)
                    // Деление на scale увеличивает/уменьшает фигуру
                    let sx = x / scale;
                    let sy = y / scale;

                    // Классическая формула 2D сердца: (x^2 + y^2 - 1)^3 - x^2 * y^3 <= 0
                    let z = sx * sx + sy * sy - 1;
                    
                    if (z * z * z - sx * sx * sy * sy * sy < 0) {
                        // Сердце закрашено. 
                        // Можно сделать "блик" меняя символы, или оставить просто '*', '#', '@'
                        row += "@"; 
                    } else {
                        row += " "; 
                    }
                }
                result.push(row);
            }
            pre.innerText = result.join("\n");
        }, 50);
    </script>
</body>
</html>
